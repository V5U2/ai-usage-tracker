client_name = "server"

[aggregation_server]
# Used by `python3 ai_usage_tracker.py server serve`.
host = "127.0.0.1"
port = 8318
db = "ai_usage_server.sqlite"
# Optional legacy static API key for JSON report APIs. Prefer creating managed
# admin API keys in the web UI after first start.
# admin_api_key = "change-me"

[web_auth]
# Web UI auth mode:
# - "none": no app login; use only on loopback, trusted LAN, VPN, or behind
#   Cloudflare Access/Authentik/etc.
# - "password": single local username/password login.
# - "oidc": generic OIDC authorization-code login using the provider userinfo endpoint.
mode = "none"
# Required for "password" or "oidc"; generate a long random value.
# session_secret = "change-me-to-a-long-random-string"

# Password mode. Generate the hash with:
# python3 ai_usage_tracker.py server hash-password 'your-password'
# username = "admin"
# password_hash = "pbkdf2_sha256$..."

# OIDC mode.
# oidc_issuer = "https://auth.example.com/application/o/ai-usage-tracker/"
# oidc_client_id = "client-id"
# oidc_client_secret = "client-secret"
# Optional when reverse proxy headers do not produce the public callback URL.
# oidc_redirect_url = "https://usage.example.com/auth/oidc/callback"
# oidc_scopes = ["openid", "email", "profile"]
# Optional allowlist. Set at least one when the provider app is not already restricted.
# oidc_allowed_email = "you@example.com"
# oidc_allowed_subject = "provider-subject-id"

[openrouter_broadcast]
# Optional direct OpenRouter Broadcast OTLP ingest at POST /v1/traces.
# Configure the same token in OpenRouter Broadcast custom headers as:
# Authorization: Bearer <api_key>
enabled = false
# api_key = "change-me"
# Optional extra exact-match header for a custom header that reaches the origin.
# Do not use this for Cloudflare Access service-token headers; Cloudflare
# consumes those at the edge.
# required_header_name = "X-OpenRouter-Broadcast-Secret"
# required_header_value = "change-me-too"
# Retain Broadcast OTLP bodies for `server replay-broadcast`.
retain_payload_body = true

[pricing]
# Estimate missing OpenAI API and Claude API costs on the aggregation server
# when older collectors send usage rows without provider-reported costs.
estimate_openai_api_costs = false
estimate_claude_api_costs = false
include_reasoning_tokens_as_output = true
# Reporting-only normalization for OpenRouter Broadcast rows. When true,
# nonzero costs stored as OpenRouter "credits" are treated as USD in reports
# and dashboard summaries. Stored rows keep their original provider unit.
report_openrouter_credits_as_usd = false

[storage]
raw_payload_body = false
extracted_attributes = "redacted"
model = true
session_id = true
thread_id = true
max_body_bytes = 52428800

[redaction]
keys = [
  "authorization",
  "cookie",
  "set-cookie",
  "user.account_id",
  "user.email",
]
key_parts = [
  "api_key",
  "apikey",
  "auth_token",
  "bearer",
  "credential",
  "password",
  "secret",
]
