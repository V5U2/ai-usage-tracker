client_name = "local"

[server]
# Optional central server forwarding. Leave endpoint/api_key unset for local-only
# collection.
# endpoint = "http://127.0.0.1:8318"
# api_key = "ait_generated_token_from_admin_ui"
batch_size = 100
timeout_seconds = 10

[central_server]
# Used by `python3 codex_usage_observer.py server serve`.
host = "127.0.0.1"
port = 8318
db = "codex_usage_server.sqlite"
# Required for JSON report APIs. The LAN-only admin UI does not require login.
# admin_api_key = "change-me"

[storage]
# Store raw OTEL payload bodies for troubleshooting. Set false to keep only
# payload metadata plus extracted token rows.
raw_payload_body = true

# Controls the attributes_json stored with extracted usage events:
# - "redacted": keep attributes but redact common account/credential fields
# - "full": keep all extracted attributes
# - "none": store no extracted attributes
extracted_attributes = "redacted"

# Store these dimensions on extracted usage rows.
model = true
session_id = true
thread_id = true

# Reject larger inbound payloads.
max_body_bytes = 52428800

[redaction]
# These replace the default redaction lists when provided.
keys = [
  "authorization",
  "cookie",
  "set-cookie",
  "user.account_id",
  "user.email",
]
key_parts = [
  "api_key",
  "apikey",
  "auth_token",
  "bearer",
  "credential",
  "password",
  "secret",
]
