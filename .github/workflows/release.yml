name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release variables
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          collector_archive="ai-usage-tracker-collector-${tag}.tar.gz"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "collector_archive=${collector_archive}" >> "${GITHUB_OUTPUT}"

      - name: Build collector release tarball
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          package_dir="dist/ai-usage-tracker-collector-${tag}"

          rm -rf dist
          mkdir -p "${package_dir}"
          cp codex_usage_observer.py "${package_dir}/"
          cp codex_usage_observer.example.toml "${package_dir}/"
          cp README.md "${package_dir}/"
          cp -R codex_usage_tracker "${package_dir}/codex_usage_tracker"
          mkdir -p "${package_dir}/deploy"
          cp -R deploy/collector "${package_dir}/deploy/collector"
          cp deploy/README.md "${package_dir}/deploy/README.md"

          tar -C dist -czf "dist/${{ steps.vars.outputs.collector_archive }}" "ai-usage-tracker-collector-${tag}"

      - name: Upload collector workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.collector_archive }}
          path: dist/${{ steps.vars.outputs.collector_archive }}
          if-no-files-found: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(steps.vars.outputs.tag, '-') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
          files: dist/${{ steps.vars.outputs.collector_archive }}
