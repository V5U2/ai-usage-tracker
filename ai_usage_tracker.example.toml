client_name = "local"

[collector]
# Optional forwarding to the aggregation server. Leave endpoint/api_key unset
# for local-only collection.
# endpoint = "http://127.0.0.1:8318"
# api_key = "ait_generated_token_from_admin_ui"
# Optional Cloudflare Access service-token headers for collectors sending to an
# aggregator protected by Cloudflare Access.
# cloudflare_access_client_id = "your.cloudflare.access.client.id"
# cloudflare_access_client_secret = "your.cloudflare.access.client.secret"
batch_size = 100
timeout_seconds = 10

[aggregation_server]
# Used by `python3 ai_usage_tracker.py server serve`.
host = "127.0.0.1"
port = 8318
db = "ai_usage_server.sqlite"
# Required for JSON report APIs. The LAN-only admin UI does not require login.
# admin_api_key = "change-me"

[openrouter_broadcast]
# Optional direct OpenRouter Broadcast OTLP ingest at POST /v1/traces.
# Configure the same token in OpenRouter Broadcast custom headers as:
# Authorization: Bearer <api_key>
enabled = false
# api_key = "change-me"
# Optional extra exact-match header for a custom header that reaches the origin.
# Do not use this for Cloudflare Access service-token headers; Cloudflare
# consumes those at the edge.
# required_header_name = "X-OpenRouter-Broadcast-Secret"
# required_header_value = "change-me-too"
# Retain Broadcast OTLP bodies for `server replay-broadcast`.
retain_payload_body = true

[pricing]
# Estimate missing OpenAI API costs from token counts for known OpenAI model
# names, and missing Claude API costs from token counts for known Claude model
# names. Provider-reported costs always take precedence. Rates are embedded
# from the public OpenAI and Claude API pricing docs and should be reviewed
# when providers change pricing.
estimate_openai_api_costs = false
estimate_claude_api_costs = false
# Reasoning tokens are billed as output tokens by OpenAI API models. Leave this
# true unless your telemetry source already includes reasoning tokens in
# output_tokens.
include_reasoning_tokens_as_output = true
# Reporting-only normalization for OpenRouter Broadcast rows. When true,
# nonzero costs stored as OpenRouter "credits" are treated as USD in reports
# and dashboard summaries. Stored rows keep their original provider unit.
report_openrouter_credits_as_usd = false

[storage]
# Keep only payload metadata plus extracted token/tool rows by default. Set true
# temporarily when troubleshooting raw OTEL payload parsing.
raw_payload_body = false

# Controls the attributes_json stored with extracted usage events:
# - "redacted": keep attributes but redact common account/credential fields
# - "full": keep all extracted attributes
# - "none": store no extracted attributes
extracted_attributes = "redacted"

# Store these dimensions on extracted usage rows.
model = true
session_id = true
thread_id = true

# Reject larger inbound payloads.
max_body_bytes = 52428800

[redaction]
# These replace the default redaction lists when provided.
keys = [
  "authorization",
  "cookie",
  "set-cookie",
  "user.account_id",
  "user.email",
]
key_parts = [
  "api_key",
  "apikey",
  "auth_token",
  "bearer",
  "credential",
  "password",
  "secret",
]
