client_name = "docker-server"

[aggregation_server]
host = "0.0.0.0"
port = 8318
db = "/data/ai_usage_server.sqlite"

[web_auth]
# Default container config keeps current behavior. Put the container behind
# Cloudflare Access/Authentik/VPN, or switch to "password" / "oidc" in
# /data/server.toml.
mode = "none"

[openrouter_broadcast]
enabled = false
# api_key = "change-me"
# Optional extra exact-match header for a custom header that reaches the origin.
# Do not use Cloudflare Access service-token headers here.
# required_header_name = "X-OpenRouter-Broadcast-Secret"
# required_header_value = "change-me-too"
retain_payload_body = true

[pricing]
estimate_openai_api_costs = true
estimate_claude_api_costs = true
include_reasoning_tokens_as_output = true
# Reporting-only: treat OpenRouter Broadcast costs stored as credits as USD in
# reports and dashboard summaries. Stored rows keep the original credits unit.
report_openrouter_credits_as_usd = false

[storage]
raw_payload_body = false
extracted_attributes = "redacted"
model = true
session_id = true
thread_id = true
max_body_bytes = 52428800
